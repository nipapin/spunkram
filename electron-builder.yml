appId: com.atomx.installer
productName: AtomX Installer
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: AtomX-Installer
  icon: build/icon.ico
  target:
    - target: squirrel
      arch:
        - x64
# Настройки Squirrel
squirrelWindows:
  iconUrl: https://raw.githubusercontent.com/neuronbug/app-installer-helper-atomx/main/build/icon.ico
  loadingGif: build/installer.gif  # Необязательно: GIF, отображаемый во время установки
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
mac:
  icon: build/icon.icns
  category: public.app-category.utilities
  target:
    - target: dmg
    - target: zip
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false

# DMG конфигурация (macOS installer)
dmg:
  artifactName: ${productName}-${version}.${ext}
  background: build/background.jpg
  icon: build/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
linux:
  target:
    - AppImage
    - deb
  maintainer: get-atomx.com
  category: Utility
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://get-atomx.com/changelog
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
