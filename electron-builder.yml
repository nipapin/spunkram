appId: com.atomx.manager
productName: AtomX Manager
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}'
  - '!**/node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme,test,__tests__,tests,powered-test,example,examples,*.d.ts}'
  - '!**/node_modules/.bin'
  - '!**/*.{spec,test}.{js,mjs,cjs,ts,mts,cts,jsx,tsx}'
  - '!**/node_modules/**/{.editorconfig,.eslintrc.js,.eslintrc.cjs,.eslintrc.json,.eslintrc,.eslintignore,.gitattributes,.gitignore,.npmignore,.prettierrc,.prettierrc.js,.prettierrc.json,.prettierrc.yaml,.prettierrc.yml}'
compression: normal
asar: true
asarUnpack:
  - resources/**
win:
  executableName: AtomX-Manager
  icon: build/icon.ico
  target:
    # - target: nsis
    #   arch:
    #     - x64
    - target: portable
      arch:
        - x64
portable:
  artifactName: ${productName}_${version}_portable.${ext}
  requestExecutionLevel: user # или admin, если требуются права администратора // def: user
  splashImage: build/icon.png # опционально: изображение для заставки
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true
  differentialPackage: false
mac:
  icon: build/icon.icns
  category: public.app-category.utilities
  target:
    - target: dmg
    - target: zip
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false

# DMG конфигурация (macOS installer)
dmg:
  artifactName: ${productName}-${version}.${ext}
  background: build/background.jpg
  icon: build/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
linux:
  target:
    - AppImage
    - deb
  maintainer: get-atomx.com
  category: Utility
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://get-atomx.com/changelog
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
