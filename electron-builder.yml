# Конфигурация electron-builder.
# При наличии этого файла поле `build` в package.json ИГНОРИРУЕТСЯ —
# все настройки сборки держим строго здесь.

appId: com.spunkram.installer
productName: Spunkram Installer

directories:
  buildResources: build

# Что попадает в asar/Resources.app собранного приложения.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}'
  - '!**/node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme,test,__tests__,tests,powered-test,example,examples,*.d.ts}'
  - '!**/node_modules/.bin'
  - '!**/*.{spec,test}.{js,mjs,cjs,ts,mts,cts,jsx,tsx}'
  - '!**/node_modules/**/{.editorconfig,.eslintrc.js,.eslintrc.cjs,.eslintrc.json,.eslintrc,.eslintignore,.gitattributes,.gitignore,.npmignore,.prettierrc,.prettierrc.js,.prettierrc.json,.prettierrc.yaml,.prettierrc.yml}'

# Нативные плагины (CSBridge etc.) — кладём в <resources>/plugins.
# Источник зависит от ОС, см. resources/plugins/{win,mac}.
# Используется в src/main/ipc/cep-paths.ts → getPluginsRoot().
extraResources:
  - from: resources/plugins/${os}
    to: plugins
    filter:
      - '**/*'

compression: store
asar: true

win:
  executableName: Spunkram-Installer
  icon: resources/icon.png
  target:
    - target: portable
      arch:
        - x64

portable:
  artifactName: ${productName}_${version}_portable.${ext}
  # У портативной версии нет UAC — права админа поднимаем точечно
  # через sudo-prompt только на копию нативных плагинов (см. install-plugins.ts).
  requestExecutionLevel: user
  splashImage: resources/icon.png
  # Сохраняем распакованные файлы между запусками,
  # чтобы повторный запуск стартовал быстрее.
  keepTemporaryPath: true

mac:
  icon: resources/icon.png
  category: public.app-category.utilities
  target:
    - target: dmg
    - target: zip
  # entitlementsInherit указывает на build/entitlements.mac.plist
  # (создаётся в репозитории, нужен для будущего code-signing).
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false

dmg:
  artifactName: ${productName}-${version}.${ext}
  icon: resources/icon.png
  iconSize: 100
  window:
    width: 540
    height: 380

linux:
  target:
    - AppImage
    - deb
  maintainer: spunkram.motionflow.pro
  category: Utility

appImage:
  artifactName: ${productName}-${version}.${ext}

npmRebuild: false

publish:
  provider: generic
  url: https://spunkram.motionflow.pro/changelog

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
